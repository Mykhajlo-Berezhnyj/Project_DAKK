<!doctype html>
<html lang="en" :lang="$store.locale.current" x-data="localization">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project</title>
  </head>

  <body data-page="project-single">
    <load src="./src/partials/header.html" />

    <main
      class="single"
      id="singleProject"
      x-data="loadSingleProject"
      x-init="$watch('$store.locale.current', () => init())"
    >
      <!-- Cover -->
      <!--  <img x-show="project?.cover" :src="project?.cover" /> -->

      <!-- Hero -->

      <section
        class="hero container-100 grey"
        :style="project?.cover 
    ? `background-image: image-set(
         url(${project.cover}?w=320&fm=webp) type('image/webp') 1x,
         url(${project.cover}?w=640&fm=webp) type('image/webp') 2x,
         url(${project.cover}?w=320&fm=jpeg) type('image/jpeg') 1x,
         url(${project.cover}?w=640&fm=jpeg) type('image/jpeg') 2x
       )` 
    : ''"
      ></section>

      <!-- Main Details -->
      <section class="main-details grey">
        <div class="container grey">
          <div class="main-details-content">
            <div class="main-details-content-1">
              <h1 x-text="project?.projectName"></h1>
              <ul class="meta-info">
                <li x-text="project?.category?.name"></li>
                <li x-text="project?.city?.name+ ', '+project?.country"></li>
              </ul>
            </div>

            <dl class="main-details-content-2">
              <div class="description-group">
                <dt x-text="project?.area ? 'Площа:' : ''"></dt>
                <dd x-text="project?.area ? project.area + ' м²' : ''"></dd>
              </div>

              <div class="description-group">
                <dt x-text="project?.timeline ? 'Рік роботи:' : ''"></dt>
                <dd
                  x-text="project?.timeline
                  ? (project.timeline.yearStart && project.timeline.yearEnd
                  ? project.timeline.yearStart + ' - ' + project.timeline.yearEnd
                  : (project.timeline.yearStart ?? project.timeline.yearEnd))
                  : ''"
                ></dd>
              </div>

              <div class="description-group">
                <dt x-text="project?.status ? 'Статус:' : ''"></dt>
                <dd
                  x-text="project?.status ? statusLang.find(s => s.key === project?.status)?.label[$store.locale.current] : ''"
                ></dd>
              </div>
            </dl>

            <a
              class="project-link"
              x-show="project?.siteUrl"
              :href="project?.siteUrl"
            >
              Перейти на сайт проекту: <span x-text="project?.siteUrl"></span>
            </a>
          </div>
        </div>
      </section>

      <!-- Description -->
      <template x-if="project?.description">
        <section class="divider">
          <div class="container">
            <p x-text="project?.description"></p>
          </div>
        </section>
      </template>

      <!-- Deatils -->
      <section class="tech-details">
        <div class="container tech-container">
          <h3 x-text="'Технічна інформація'" class="tech-title"></h3>
          <dl class="details-1">
            <template x-if="project?.typeOfServices?.length">
              <div class="description-group">
                <dt
                  x-text="project?.typeOfServices.length > 1 ? 'Надані послуги: ' : 'Надана послуга: '"
                ></dt>
                <dd>
                  <ul>
                    <template
                      x-for="(item, index) in project?.typeOfServices"
                      :key="index"
                    >
                      <li x-text="item.name"></li>
                    </template>
                  </ul>
                </dd>
              </div>
            </template>

            <template x-if="project?.supplier?.length">
              <div class="description-group">
                <dt
                  x-text="project?.supplier.length > 1 ? 'Замовники: ' : 'Замовник: '"
                ></dt>
                <dd>
                  <ul>
                    <template x-for="item in project?.supplier" :key="item._id">
                      <li x-text="item.name"></li>
                    </template>
                  </ul>
                </dd>
              </div>
            </template>

            <div class="description-group">
              <dt
                x-text="project?.generalDesigner?.name ? 'Генпроектувальник: ' : ''"
              ></dt>
              <dd>
                <a
                  x-show="project?.generalDesigner"
                  :href="project?.generalDesigner?.link"
                  target="_blank"
                  alt=""
                >
                  <span x-text="project?.generalDesigner?.name"></span>
                </a>
              </dd>
            </div>

            <div class="description-group">
              <dt x-text="'Код категорії:'"></dt>
              <dd x-text="project?.consequenceClass"></dd>
            </div>
            <div class="description-group">
              <dt x-text="'Конструктив:'"></dt>
              <dd x-text="project?.constructive"></dd>
            </div>
            <div class="description-group" x-show="project?.award">
              <dt x-text="'Нагороди:'"></dt>
              <dd x-text="project?.award"></dd>
            </div>
          </dl>

          <!-- Partners -->
          <!-- <template x-if="project?.partners?.length">
              <div class="description-group">
                <dt
                  x-text="project?.partners.length > 1 ? 'Партнери по проекту: ' : 'Партнер по проекту: '"
                ></dt>
                <dd>
                  <ul>
                    <template x-for="item in project?.partners" :key="item._id">
                      <li x-text="item.name"></li>
                    </template>
                  </ul>
                </dd>
              </div>
            </template> -->

          <div class="pdf-link">
            <a
              x-show="project?.linkDocuments"
              :href="project?.linkDocuments"
              target="_blank"
              alt=""
            >
              <img src="/images/pdf_icon.jpg" width="30px" />
              <span>Паспорт об'єкта</span>
            </a>
          </div>
        </div>
      </section>

      <!--Web and Gallery-->
      <section class="light-grey" x-show="project?.photo?.length">
        <div class="container">
          <div class="gallery" x-show="project?.photo?.length">
            <div class="gallery-wrapper">
              <button
                @click="galleryData.prev()"
                class="arrow left"
                x-show="galleryData.isSlaider"
              >
                &lt;
              </button>

              <div class="gallery-track" x-ref="track">
                <template
                  x-for="(img, index) in galleryData.isSlaider ? [...galleryData.photos, ...galleryData.photos, ...galleryData.photos] : galleryData.photos"
                  :key="index"
                >
                  <img
                    class="thumbnail"
                    :src="img"
                    :class="{'active': index === galleryData.activeIndex}"
                    @click="galleryData.openModal(img)"
                  />
                </template>
              </div>

              <button
                @click="galleryData.next()"
                class="arrow right"
                x-show="galleryData.isSlaider"
              >
                &gt;
              </button>
            </div>

            <template x-if="galleryData.activeImage">
              <div class="modal" @click="galleryData.closeModal()">
                <div class="image-wrapper">
                  <button
                    @click.stop="galleryData.prev()"
                    class="arrow left"
                    x.show="project?.photo?.length > 1"
                  >
                    &lt;
                  </button>
                  <img :src="galleryData.activeImage" />
                  <button
                    @click.stop="galleryData.next()"
                    class="arrow right"
                    x.show="project?.photo?.length > 1"
                  >
                    &gt;
                  </button>
                </div>
              </div>
            </template>
          </div>
        </div>
      </section>

      <!-- Partners -->
      <template x-if="project?.partners?.length">
        <section>
          <div class="container partners">
            <h3>Партнери</h3>
            <ul>
              <template x-for="p in project.partners" :key="p._id">
                <li class="partners-items">
                  <a x-show="p.link" :href="p.link" target="_blank">
                    <div>
                      <img x-show="p.logo" :src="p.logo" />
                      <span x-text="p.name"></span>
                    </div>
                  </a>
                </li>
              </template>
            </ul>
          </div>
        </section>
      </template>

      <load src="./src/partials/projects-preview.html" />
      <load src="./src/partials/leaflet.html" />
    </main>

    <load src="./src/partials/footer.html" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
