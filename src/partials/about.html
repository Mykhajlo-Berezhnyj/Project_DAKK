<section class="about">
  <div class="container">
    <div class="about__hero">
      <h1 class="about__title" x-text="t(aboutData.title)"></h1>
      <p class="about__lead" x-text="t(aboutData.lead)"></p>
    </div>

    <div class="about__grid">
      <div class="about__item">
        <h2 class="about__subtitle" x-text="t(aboutData.missionTitle)"></h2>
        <p x-text="t(aboutData.missionText)"></p>
      </div>
      <div class="about__item about__item--accent">
        <h2 class="about__subtitle" x-text="t(aboutData.protectionTitle)"></h2>

        <p x-text="t(aboutData.protectionText)"></p>
      </div>
    </div>

    <div class="about__wide-block">
      <h2 class="about__subtitle" x-text="t(aboutData.competenceTitle)"></h2>
      <div class="about__text-columns">
        <p x-text="t(aboutData.competenceText1)"></p>
        <p x-text="t(aboutData.competenceText2)"></p>
      </div>
    </div>

    <div class="about__tech">
      <h2 class="about__subtitle" x-text="t(aboutData.techTitle)"></h2>
      <ul class="about__list">
        <li>
          <strong
            x-text="$store.locale.current === 'uk' ? 'Інструментарій:' : 'Tools:'"
          ></strong>
          МСЕ (метод скінченних елементів), САПР та BIM-моделювання.
        </li>
        <li>
          <strong
            x-text="$store.locale.current === 'uk' ? 'Стандарти:' : 'Standards:'"
          ></strong>
          Перехід на Eurocode здійснено ще у 2012 році.
        </li>
        <li>
          <strong
            x-text="$store.locale.current === 'uk' ? 'Якість:' : 'Quality:'"
          ></strong>
          Сертифікація згідно з ISO 9001:2015.
        </li>
      </ul>
    </div>

    <blockquote class="about__quote">
      <p x-text="t(aboutData.quote)"></p>
    </blockquote>

    <div class="about__facts">
      <div class="fact-card">
        <span>2005</span>
        <p
          x-text="$store.locale.current === 'uk' ? 'Рік заснування' : 'Year of foundation'"
        ></p>
      </div>
      <div class="fact-card">
        <span>ISO</span>
        <p
          x-text="$store.locale.current === 'uk' ? 'Сертифікація 9001:2015' : 'ISO 9001:2015 Certification'"
        ></p>
      </div>
      <div class="fact-card">
        <span>2012</span>
        <p
          x-text="$store.locale.current === 'uk' ? 'Робота за Eurocode' : 'Eurocode implementation'"
        ></p>
      </div>
      <div class="fact-card">
        <span>2023</span>
        <p
          x-text="$store.locale.current === 'uk' ? 'Об\'єкти захисту' : 'Protection objects'"
        ></p>
      </div>
    </div>
  </div>
</section>
