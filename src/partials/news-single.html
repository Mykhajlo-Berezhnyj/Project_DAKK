<div class="container">
  <div x-data="news" class="post">
    <div class="post-img-thumb">
      <img
        :src="$store.news.curentNew?.images"
        alt="post logo"
        class="post-logo"
        height="170px"
      />
    </div>
    <div class="post-content-thumb">
      <a href="./news.html" class="post-link-back"></a>
      <p class="post-definition">Публікація</p>
      <h3 x-text="$store.news.curentNew?.title" class="post-title"></h3>
      <p x-text="$store.news.curentNew?.description" class="post-description"></p>
    </div>
    <button
      type="button"
      @click="$store.news.resetCurrentNew(), window.history.pushState({}, '', '/news')"
      class="post-btn-back"
    >
      Повернутися до публікацій
    </button>
  </div>
  <div class="post-more-publication"></div>
</div>
